allowBuilds:
  '@parcel/watcher': set this to true or false
  '@swc/core': set this to true or false
  esbuild: set this to true or false
  sharp: set this to true or false
  unrs-resolver: set this to true or false
onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@swc/core'
  - esbuild
  - sharp
  - unrs-resolver
# Sécurité : force fast-uri >=3.1.2 (CVE path-traversal / host-confusion).
# Dép. transitive via @payloadcms/db-sqlite > @payloadcms/drizzle.
overrides:
  fast-uri: '^3.1.2'
